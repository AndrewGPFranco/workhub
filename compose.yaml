services:
  postgres:
    image: 'postgres:17'
    container_name: db_workhub
    environment:
      - 'POSTGRES_DB=${DB}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USER}'
    ports:
      - '5432:5432'
  redis:
    image: 'redis:latest'
    container_name: redis_workhub
    ports:
      - '6379:6379'
    volumes:
      - cache:/data

volumes:
  cache:
    driver: local